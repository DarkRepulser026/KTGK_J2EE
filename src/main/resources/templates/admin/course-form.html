<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title th:text="${formTitle} + ' - EduEnroll'">Course Form - EduEnroll</title>
    <link rel="preconnect" href="https://fonts.googleapis.com"/>
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>
    <link rel="stylesheet" th:href="@{/css/index.css}" href="../../static/css/index.css"/>
    <style>
        .form-shell { max-width: 760px; margin: 44px auto; padding: 0 5vw 56px; }
        .form-card { background: #fff; border: 1px solid var(--cream); border-radius: 16px; padding: 24px; }
        .form-title { font-family: var(--serif); font-size: 2rem; margin-bottom: 16px; }
        .field { margin-bottom: 16px; }
        .field label { display: block; margin-bottom: 8px; font-size: 0.83rem; letter-spacing: 0.08em; text-transform: uppercase; color: var(--muted); }
        .field input, .field select { width: 100%; border: 1px solid var(--cream); border-radius: 8px; padding: 10px 12px; font-size: 0.92rem; font-family: var(--sans); background: #fff; }
        .field .err { margin-top: 6px; color: #8e1f1f; font-size: 0.82rem; }
        .form-actions { display: flex; gap: 10px; margin-top: 8px; }
        .btn-line { border: 1px solid var(--cream); border-radius: 6px; padding: 10px 16px; text-decoration: none; color: var(--ink); }
        @media (max-width: 720px) { .form-title { font-size: 1.6rem; } }
    </style>
</head>
<body>
<nav>
    <a href="/" class="nav-brand"><span></span>EduEnroll</a>
    <div class="nav-links">
        <a href="/courses">Courses</a>
        <a href="/admin/courses">Admin</a>
    </div>
</nav>

<main class="form-shell">
    <div class="form-card">
        <h1 class="form-title" th:text="${formTitle}">Create Course</h1>

        <form th:action="@{${submitPath}}" th:object="${courseForm}" method="post">
            <div class="field">
                <label for="name">Course Name</label>
                <input id="name" type="text" th:field="*{name}"/>
                <p class="err" th:if="${#fields.hasErrors('name')}" th:errors="*{name}">Invalid</p>
            </div>

            <div class="field">
                <label for="credits">Credits</label>
                <input id="credits" type="number" min="1" max="10" th:field="*{credits}"/>
                <p class="err" th:if="${#fields.hasErrors('credits')}" th:errors="*{credits}">Invalid</p>
            </div>

            <div class="field">
                <label for="lecturer">Lecturer</label>
                <input id="lecturer" type="text" th:field="*{lecturer}"/>
                <p class="err" th:if="${#fields.hasErrors('lecturer')}" th:errors="*{lecturer}">Invalid</p>
            </div>

            <div class="field">
                <label for="categoryId">Category</label>
                <select id="categoryId" th:field="*{categoryId}">
                    <option value="">Select category</option>
                    <option th:each="category : ${categories}" th:value="${category.id}" th:text="${category.name}">Category</option>
                </select>
                <p class="err" th:if="${#fields.hasErrors('categoryId')}" th:errors="*{categoryId}">Invalid</p>
            </div>

            <div class="field">
                <label for="image">Image URL</label>
                <input id="image" type="text" th:field="*{image}" placeholder="https://..."/>
                <p class="err" th:if="${#fields.hasErrors('image')}" th:errors="*{image}">Invalid</p>
            </div>

            <div class="form-actions">
                <button class="btn-primary" type="submit">Save</button>
                <a href="/admin/courses" class="btn-line">Cancel</a>
            </div>
        </form>
    </div>
</main>
</body>
</html>
