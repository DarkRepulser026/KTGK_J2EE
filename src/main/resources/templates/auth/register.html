<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Register - EduEnroll</title>
    <link rel="preconnect" href="https://fonts.googleapis.com"/>
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>
    <link rel="stylesheet" th:href="@{/css/index.css}" href="../../static/css/index.css"/>
    <style>
        .auth-shell { max-width: 560px; margin: 48px auto; padding: 0 5vw 56px; }
        .auth-card { background: #fff; border: 1px solid var(--cream); border-radius: 16px; padding: 28px; }
        .auth-title { font-family: var(--serif); font-size: 2rem; margin-bottom: 8px; }
        .auth-sub { color: var(--muted); margin-bottom: 18px; }
        .field { margin-bottom: 14px; }
        .field label { display: block; font-size: 0.8rem; letter-spacing: 0.08em; color: var(--muted); text-transform: uppercase; margin-bottom: 6px; }
        .field input { width: 100%; border: 1px solid var(--cream); border-radius: 8px; padding: 10px 12px; font-family: var(--sans); }
        .err { color: #8f1f1f; font-size: 0.82rem; margin-top: 6px; }
        .ok { background: #e4f8ea; border: 1px solid #b9e8ca; color: #1f5f39; padding: 10px 12px; border-radius: 8px; margin-bottom: 14px; }
    </style>
</head>
<body>
<nav>
    <a href="/" class="nav-brand"><span></span>EduEnroll</a>
    <div class="nav-links">
        <a href="/courses">Courses</a>
        <a href="/login" class="btn-login">Sign in</a>
    </div>
</nav>

<main class="auth-shell">
    <div class="auth-card">
        <h1 class="auth-title">Create Student Account</h1>
        <p class="auth-sub">Register with username, password, and email.</p>

        <p class="ok" th:if="${registered}">Registration successful. You can sign in now.</p>

        <form th:action="@{/register}" th:object="${registerForm}" method="post">
            <div class="field">
                <label for="username">Username</label>
                <input id="username" type="text" th:field="*{username}"/>
                <p class="err" th:if="${#fields.hasErrors('username')}" th:errors="*{username}">Invalid username</p>
            </div>

            <div class="field">
                <label for="password">Password</label>
                <input id="password" type="password" th:field="*{password}"/>
                <p class="err" th:if="${#fields.hasErrors('password')}" th:errors="*{password}">Invalid password</p>
            </div>

            <div class="field">
                <label for="email">Email</label>
                <input id="email" type="email" th:field="*{email}"/>
                <p class="err" th:if="${#fields.hasErrors('email')}" th:errors="*{email}">Invalid email</p>
            </div>

            <button class="btn-primary" type="submit">Register</button>
        </form>
    </div>
</main>
</body>
</html>
