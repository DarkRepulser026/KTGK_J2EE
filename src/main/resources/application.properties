spring.application.name=demo
spring.datasource.url=jdbc:postgresql://localhost:5433/course_registration
spring.datasource.username=postgres
spring.datasource.password=1234
spring.jpa.hibernate.ddl-auto=update
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.show-sql=true
logging.level.org.springframework.jdbc=DEBUG
logging.level.com.zaxxer.hikari=DEBUG
server.port=8088

# Google OAuth2 setup:
# 1. Create OAuth credentials in Google Cloud Console.
# 2. Add http://localhost:8088/login/oauth2/code/google as an authorized redirect URI.
# 3. Set GOOGLE_CLIENT_ID and GOOGLE_CLIENT_SECRET in your environment.
spring.security.oauth2.client.registration.google.client-id=${GOOGLE_CLIENT_ID}
spring.security.oauth2.client.registration.google.client-secret=${GOOGLE_CLIENT_SECRET}
spring.security.oauth2.client.registration.google.scope=openid,profile,email